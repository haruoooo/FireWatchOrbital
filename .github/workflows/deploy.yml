name: Deploy FireWatch Orbital → Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Garantir pasta static existe
        run: mkdir -p static

      - name: Executar teste de sanidade
        env:
          NASA_API_KEY: "dummy-key-for-ci-validation"
        run: python -c "from app.config import Settings; from app.models import FireData; from app.services.fire_classifier import classify_alert; print('Módulos carregados com sucesso')"

      - name: Login no Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy no Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_APP_NAME }}
          package: .
          startup-command: "gunicorn --bind=0.0.0.0:8000 --worker-class uvicorn.workers.UvicornWorker main:app"

      - name: Logout do Azure
        if: always()
        run: az logout || true